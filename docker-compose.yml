services:
  postgres:
    image: postgres:18-alpine
    container_name: ifome-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ifome}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ifome}
      POSTGRES_DB: ${POSTGRES_DB:-ifome}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ifome} -d ${POSTGRES_DB:-ifome}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
